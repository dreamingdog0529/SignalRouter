name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: build/test only needs to read the repository contents.
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json

      # nuget.config registers ../.local-feed (shared local package feed for
      # sibling repos); NuGet fails restore with NU1301 if the folder is absent.
      - name: Create local package feed directory
        run: mkdir -p ../.local-feed

      - name: Build
        run: dotnet build ./SignalRouter.slnx

      - name: Test
        run: dotnet test ./SignalRouter.slnx --no-build
