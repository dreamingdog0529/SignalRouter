name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly Sunday 03:17 UTC (offset from other cron jobs)
    - cron: "17 3 * * 0"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # `actions` scans the workflow files; `csharp` scans the .NET runtime
        # sources. C# uses build-mode `none` (buildless analysis) so CodeQL does
        # not need the .NET SDK or a successful `dotnet build` to create the
        # database. See docs/security-hardening.md before adding languages.
        include:
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: none
    steps:
      - name: Report unavailable CodeQL
        if: ${{ github.event.repository.private && vars.CODEQL_ENABLED != 'true' }}
        run: |
          echo "::notice::CodeQL requires GitHub Advanced Security for private repositories."
          echo "::notice::After enabling it, set the repository Actions variable CODEQL_ENABLED=true."

      - name: Checkout
        if: ${{ !github.event.repository.private || vars.CODEQL_ENABLED == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        if: ${{ !github.event.repository.private || vars.CODEQL_ENABLED == 'true' }}
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        if: ${{ !github.event.repository.private || vars.CODEQL_ENABLED == 'true' }}
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
