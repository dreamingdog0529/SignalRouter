version: "3"

tasks:
  default:
    cmds: [task --list]

  check:
    desc: Run all pre-commit checks
    cmds:
      - task: spellcheck
      - task: commit-check
      - task: build
      - task: test

  spellcheck:
    desc: Run spell checker (mirrors CI)
    cmds:
      - typos --config .typos.toml

  commit-check:
    desc: Check Conventional Commits format and DCO sign-off
    cmds:
      - pwsh -NoProfile -File ./scripts/check-commits.ps1

  build:
    desc: Build .NET projects and compile the Unity project
    cmds:
      - dotnet tool restore
      # Build/pack the SDK projects first so the local feed holds the
      # SignalRouter.Core/Protocol packages that NuGetForUnity restores next.
      # The refresh step evicts cached copies: the feed repacks a fixed version,
      # so a cached package would silently pin Unity to a stale SDK build.
      - dotnet build ./SignalRouter.slnx
      - pwsh -NoProfile -File ./scripts/refresh-local-packages.ps1
      - dotnet nugetforunity restore ./src/SignalRouter.Unity
      - pwsh -NoProfile -File ./scripts/run-unity.ps1 -Mode Compile

  test:
    desc: Run .NET and Unity EditMode tests
    cmds:
      - dotnet tool restore
      # Build/pack first so the local feed holds the SignalRouter.Core/Protocol
      # packages that NuGetForUnity restores for the Unity EditMode tests; the
      # refresh step evicts cached copies of the fixed-version local packages.
      - dotnet build ./SignalRouter.slnx
      - pwsh -NoProfile -File ./scripts/refresh-local-packages.ps1
      - dotnet nugetforunity restore ./src/SignalRouter.Unity
      - dotnet test ./SignalRouter.slnx --no-build
      - pwsh -NoProfile -File ./scripts/run-unity.ps1 -Mode Test

  setup:
    desc: Install tools and git hooks
    deps: [install-tools]
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/install-git-hooks.ps1

  install-tools:
    desc: Install required CLI tools (best-effort)
    cmds:
      - |
        echo "Ensure these tools are available on PATH:"
        echo "  - typos (https://github.com/crate-ci/typos)"
        echo "  - lefthook (https://github.com/evilmartians/lefthook)"
        echo "  - task (https://taskfile.dev/)"
        command -v typos && typos --version || echo "typos: not installed"
        command -v lefthook && lefthook version || echo "lefthook: not installed"
        command -v task && task --version || echo "task: not installed"
